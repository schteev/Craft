<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craft 3D</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="game-shell">
    <canvas id="gameCanvas" aria-label="Craft 3D game world"></canvas>

    <section class="topbar" aria-label="Game status">
      <div>
        <h1>Craft 3D</h1>
        <p id="statusMessage">Loading world...</p>
      </div>
      <div class="controls">
        <span>Drag: rotate</span>
        <span>Wheel: zoom</span>
        <span>Click: place</span>
        <span>Shift+Click: remove</span>
      </div>
    </section>

    <nav class="gamebar" aria-label="Choose block to place">
      <div class="gamebar-items" id="gamebar"></div>
    </nav>
  </main>

  <script src="script.js"></script>
</body>
</html>
