<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Craft Game</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app-shell">
    <header class="hero">
      <h1>Craft</h1>
      <p>Block-based browser game with crawling, inventory, and terrain.</p>
    </header>

    <section class="game-board">
      <div class="canvas-frame">
        <canvas id="gameCanvas" width="360" height="240"></canvas>
      </div>

      <div class="hud">
        <div class="inventory" id="inventory"></div>
        <div class="controls">
          <p><strong>W / ↑</strong> Jump · <strong>A / ←</strong> Move left · <strong>D / →</strong> Move right</p>
          <p><strong>C</strong> Crawl · <strong>Click</strong> Place block · <strong>Shift+Click</strong> Remove block</p>
        </div>
      </div>
    </section>

    <section class="panel">
      <p id="statusMessage">Game loaded...</p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
